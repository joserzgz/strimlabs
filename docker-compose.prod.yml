# ═══════════════════════════════════════════════════════════════
#  Strimlabs — Docker Compose Production (Plesk + reverse proxy)
# ═══════════════════════════════════════════════════════════════
#  Plesk maneja SSL y proxy reverso hacia los contenedores.
#  Los frontends exponen puertos en 127.0.0.1 (solo localhost).
#
#  strimlabs.com       → 127.0.0.1:3300 (sl_prod_landing)
#  app.strimlabs.com   → 127.0.0.1:3301 (sl_prod_web)
#
#  Contenedores existentes en el servidor (NO tocar):
#    cg_qa_*   → puertos 3102-3104
#    tp_qa_*   → puertos 3109-3110
#    si_prod_* → puerto 3201
#    portainer → puerto 9000
# ═══════════════════════════════════════════════════════════════

services:

  # ── Base de datos ──────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sl_prod_postgres
    restart: always
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - sl_prod_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      retries: 10
    networks:
      - sl_prod_net

  # ── API (FastAPI) ──────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile.prod
    container_name: sl_prod_api
    restart: always
    env_file: .env
    environment:
      POSTGRES_HOST: sl_prod_postgres
      API_BASE: http://sl_prod_api:8000
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sl_prod_net

  # ── Twitch Bot ─────────────────────────────────
  twitch-bot:
    build:
      context: ./ModBot/bot
      dockerfile: twitch/Dockerfile.prod
    container_name: sl_prod_twitch_bot
    restart: always
    env_file: .env
    environment:
      API_BASE: http://sl_prod_api:8000
    depends_on:
      - api
    networks:
      - sl_prod_net

  # ── Discord Bot ────────────────────────────────
  discord-bot:
    build:
      context: ./ModBot/bot
      dockerfile: discord/Dockerfile.prod
    container_name: sl_prod_discord_bot
    restart: always
    env_file: .env
    environment:
      API_BASE: http://sl_prod_api:8000
    depends_on:
      - api
    networks:
      - sl_prod_net

  # ── Landing page (strimlabs.com) ───────────────
  landing:
    build:
      context: .
      dockerfile: landing/Dockerfile.prod
    container_name: sl_prod_landing
    restart: always
    ports:
      - "127.0.0.1:3300:80"
    networks:
      - sl_prod_net

  # ── ModBot Dashboard (app.strimlabs.com) ───────
  modbot-web:
    build:
      context: .
      dockerfile: ModBot/web/Dockerfile.prod
    container_name: sl_prod_web
    restart: always
    ports:
      - "127.0.0.1:3301:80"
    depends_on:
      - api
    networks:
      - sl_prod_net

volumes:
  sl_prod_pgdata:

networks:
  sl_prod_net:
    driver: bridge
