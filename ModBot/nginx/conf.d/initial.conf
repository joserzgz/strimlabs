# Temporary config for initial SSL certificate generation
# Replace with modbot.conf after certbot runs
server {
    listen 80;
    server_name modbot.strimlabs.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /api/ {
        proxy_pass http://sl-api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        root /usr/share/nginx/html/modbot;
        try_files $uri $uri/ /index.html;
    }
}
