# HTTP → redirect to HTTPS (after SSL is set up)
server {
    listen 80;
    server_name modbot.strimlabs.com;

    # Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    http2 on;
    server_name modbot.strimlabs.com;

    ssl_certificate     /etc/letsencrypt/live/modbot.strimlabs.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/modbot.strimlabs.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # API proxy
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://sl-api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Stripe/MP webhooks (no rate limit)
    location /api/billing/ {
        proxy_pass http://sl-api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA frontend
    location / {
        root /usr/share/nginx/html/modbot;
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, no-transform";
    }

    # Static assets cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        root /usr/share/nginx/html/modbot;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
