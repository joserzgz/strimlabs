services:
  postgres:
    image: postgres:16-alpine
    container_name: sl-postgres
    restart: always
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      retries: 10
    networks:
      - internal

  api:
    build:
      context: ../api
      dockerfile: Dockerfile.prod
    container_name: sl-api
    restart: always
    env_file: .env
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  twitch-bot:
    build:
      context: ./bot
      dockerfile: twitch/Dockerfile.prod
    container_name: sl-twitch-bot
    restart: always
    env_file: .env
    depends_on:
      - api
    networks:
      - internal

  discord-bot:
    build:
      context: ./bot
      dockerfile: discord/Dockerfile.prod
    container_name: sl-discord-bot
    restart: always
    env_file: .env
    depends_on:
      - api
    networks:
      - internal

  nginx:
    image: nginx:alpine
    container_name: sl-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/active.conf:/etc/nginx/conf.d/default.conf:ro
      - ./web/dist:/usr/share/nginx/html/modbot:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-var:/var/lib/letsencrypt
      - certbot-webroot:/var/www/certbot:ro
    depends_on:
      - api
    networks:
      - internal

  certbot:
    image: certbot/certbot
    container_name: sl-certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - certbot-webroot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do sleep 12h; certbot renew --webroot -w /var/www/certbot; done'"

volumes:
  pgdata:
  certbot-etc:
  certbot-var:
  certbot-webroot:

networks:
  internal:
    driver: bridge
